# AnyOS Desktop Configuration
# ============================
# Central configuration for all display and scaling settings.
# Values are substituted into config files during Docker build.
# Runtime scripts source this file directly.
#
# For HiDPI (4K 2x) reference config, see: anyos.hidpi.conf
#
# Display Configuration
# ---------------------
# Resolution: 1920x1200 (16:10 aspect ratio)
# DPI: 96 (standard, 1x scaling)

# Display dimensions (native pixels)
ANYOS_DISPLAY_WIDTH=1920
ANYOS_DISPLAY_HEIGHT=1200
ANYOS_DISPLAY_DEPTH=24

# DPI setting for X server and font rendering
# Standard 96 DPI with no scaling
ANYOS_DPI=96

# Frame rate for recording
ANYOS_FRAMERATE=120

# Scaling Strategy
# ----------------
# No scaling - 1x DPI at native 1920x1200 resolution.
# All apps render at physical pixel resolution.

# GTK/Qt scaling factors (1x, no scaling)
ANYOS_GDK_SCALE=1
ANYOS_GDK_DPI_SCALE=1
ANYOS_QT_SCALE_FACTOR=1

# UI Element Sizes
# ----------------
ANYOS_PANEL_HEIGHT=28
ANYOS_CURSOR_SIZE=24

# Physical cursor size (same as logical at 1x scaling)
ANYOS_CURSOR_SIZE_PHYSICAL=24

# Plank dock icon size
ANYOS_DOCK_ICON_SIZE=48

# Font Sizes (in points)
# ----------------------

# UI font
ANYOS_FONT_NAME="Inter"
ANYOS_FONT_SIZE=11

# Terminal font
ANYOS_TERMINAL_FONT_NAME="JetBrains Mono"
ANYOS_TERMINAL_FONT_SIZE=11

# Window title font
ANYOS_TITLE_FONT_NAME="Inter Bold"
ANYOS_TITLE_FONT_SIZE=11
