# AnyOS HiDPI Reference Configuration (UNUSED - for reference only)
# ==================================================================
# This file documents the 4K Retina @ 2x DPI configuration we used previously.
# Kept as reference in case we need to switch back to HiDPI mode.
#
# To use:
#   1. Copy this to anyos.conf
#   2. Run install-hidpi-assets.sh after container build
#   3. Add --force-device-scale-factor=2 to Chrome wrappers in vnc-desktop.yml
#   4. Rebuild the container
#
# Display Configuration
# ---------------------
# Native resolution: 3840x2400 (16:10 aspect ratio, 4K Retina)
# Logical resolution: 1920x1200 (what apps "see" at 2x scaling)
# This matches a MacBook Pro 16" Retina display.

# Display dimensions (native pixels)
ANYOS_DISPLAY_WIDTH=3840
ANYOS_DISPLAY_HEIGHT=2400
ANYOS_DISPLAY_DEPTH=24

# DPI setting for X server and font rendering
# Use 96 DPI (standard logical DPI) - scaling is handled by GDK_SCALE=2
# Setting this to 192 causes double-scaling (4x) when combined with GDK_SCALE
ANYOS_DPI=96

# Frame rate for recording
ANYOS_FRAMERATE=120

# Scaling Strategy
# ----------------
# X11 DPI is set to 96 (logical, no scaling at X11 level).
# GDK_SCALE=2 handles all GTK/GNOME app scaling (widgets + fonts).
# Chrome/Electron apps need --force-device-scale-factor=2 flag.
# Qt apps use QT_SCALE_FACTOR=2.
#
# Some apps (Plank, XFCE Panel) ignore GDK_SCALE and need explicit 2x sizes.
# These are marked with _PHYSICAL suffix below.

# GTK/Qt scaling factors
ANYOS_GDK_SCALE=2
ANYOS_GDK_DPI_SCALE=1
ANYOS_QT_SCALE_FACTOR=2

# UI Element Sizes
# ----------------
# Logical sizes (for GDK_SCALE-aware apps like GTK3)
ANYOS_PANEL_HEIGHT=28
ANYOS_CURSOR_SIZE=24

# Physical sizes (for apps that ignore GDK_SCALE)
# Computed as logical_size * ANYOS_GDK_SCALE
ANYOS_CURSOR_SIZE_PHYSICAL=48

# Plank dock ignores GDK_SCALE, needs explicit pixel sizes
ANYOS_DOCK_ICON_SIZE=64

# Font Sizes (in points)
# ----------------------
# Point sizes are scaled by GDK_SCALE=2 to render at proper HiDPI size

# UI font
ANYOS_FONT_NAME="Inter"
ANYOS_FONT_SIZE=11

# Terminal font
ANYOS_TERMINAL_FONT_NAME="JetBrains Mono"
ANYOS_TERMINAL_FONT_SIZE=11

# Window title font
ANYOS_TITLE_FONT_NAME="Inter Bold"
ANYOS_TITLE_FONT_SIZE=11
